name: Quality gates

on:
  push:
    branches: [main, "codex/**", "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser playtest
        run: npm run test:e2e

      - name: Upload playtest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g0-playtest-evidence
          path: |
            artifacts/playtests/
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
